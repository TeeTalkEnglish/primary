<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">

    <a href="index.html">← Back to Grade 1</a>

    <h1 id="unitTitle"></h1>

    <p id="unitSubtitle"></p>

    <div class="cards">

    <a id="vocabCard">📚 Vocabulary</a>

    <a id="rearrangeCard">🔤 Rearrange Letters</a>

    <a id="sentenceCard">📝 Rearrange Sentence</a>

    <a id="matchingCard">🎯 Matching</a>

    <a id="listeningCard">🎧 Listening</a>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const grade = 1;

const unit = params.get("unit");

fetch(`../assets/data/grade1/unit${unit}.json`)
    .then(response => response.json())
    .then(data => {

       document.getElementById("vocabCard").href =
`../games/vocabulary/index.html?grade=1&unit=${unit}`;

document.getElementById("rearrangeCard").href =
`../games/rearrange/index.html?grade=1&unit=${unit}`;

document.getElementById("sentenceCard").href =
`../games/sentence/index.html?grade=1&unit=${unit}`;

document.getElementById("matchingCard").href =
`../games/matching/index.html?grade=1&unit=${unit}`;

document.getElementById("listeningCard").href =
`../games/listening/index.html?grade=1&unit=${unit}`;
    });

</script>

</html>
