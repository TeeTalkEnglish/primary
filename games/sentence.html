<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentence Builder</title>

<link rel="stylesheet" href="sentence.css">

</head>

<body>

<div class="container">

<h1>📝 Rearrange the Sentence</h1>

<div class="progress">

    <div id="progressFill"></div>

</div>

<p id="progressText"></p>

<div id="emoji" class="emoji"></div>

<div id="answer" class="answer"></div>

<div id="words" class="words"></div>

<p id="message"></p>

<div class="buttons">

<button id="resetBtn">
🔄 Reset
</button>

<button id="nextBtn">
➡ Next
</button>

</div>

</div>

<script src="sentence.js"></script>

</body>
</html>
