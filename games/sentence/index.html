<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentence Builder</title>


   <link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/game.css">
<link rel="stylesheet" href="../../assets/css/buttons.css">
<link rel="stylesheet" href="style.css">

</head>



<body>

<a id="backBtn" class="floating-back" title="Back to Unit">
    ←
</a>

<div class="container">

    <h1 id="gameTitle"></h1>

    <h2 id="unitTitle"></h2>

    <p id="loading">Loading...</p>

    <div class="progress">
        <div id="progressFill"></div>
    </div>

    <p id="exerciseCounter"></p>

    <p id="progressText"></p>

    <!-- Game-specific content -->

<div id="emoji" class="emoji"></div>

<button id="listenBtn" class="listen-btn">
    🔊 Listen
</button>

<div id="answer" class="answer"></div>

<div id="words" class="words"></div>

<p id="message"></p>

    <div class="bottom-buttons">

        <button id="hintBtn" class="btn secondary">
            💡 Hint
        </button>

        <button id="resetBtn" class="btn secondary">
            🔄 Reset
        </button>

    </div>

    <p id="hintText" class="hint-text"></p>

</div>

<button id="nextBtn" class="floating-next">
    ➜
</button>

<button id="nextGameBtn" class="next-game-btn">
    🎯 Next Game
</button>


<script src="../../assets/js/utils.js"></script>

<script src="../../assets/js/game.js"></script>

<script src="render.js"></script>
<script src="script.js"></script>

</body>
</html>
