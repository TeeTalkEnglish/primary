<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentence Builder</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/css/game.css">

</head>



<body>

<a id="backBtn" class="floating-back">
    ←
</a>


<div class="container">

<!-- <div class="top-bar">

    <a id="backBtn" class="back-btn">
        ← Back to Unit
    </a>

</div> -->
<h1>📝 Rearrange the Sentence</h1>

<h2 id="unitTitle"></h2>

<p id="loading">Loading...</p>

<div class="progress">
    <div id="progressFill"></div>
</div>

<p id="exerciseCounter"></p>

<p id="progressText"></p>

<div id="emoji" class="emoji"></div>

<button id="listenBtn">
    🔊 Listen
</button>

<div id="answer" class="answer"></div>

<div id="words" class="words"></div>

<p id="message"></p>

<div class="buttons">

    <button id="hintBtn">
        💡 Hint
    </button>

    <button id="resetBtn">
        🔄 Reset
    </button>

</div>

<button id="nextBtn" class="floating-next">
    ➜
</button>

<button
    id="nextGameBtn"
    class="next-game-btn"
    style="display:none;">
    🎯 Next Game
</button>

</div>



<script src="script.js"></script>

</body>
</html>
